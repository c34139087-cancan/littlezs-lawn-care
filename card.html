<style>
  :root{
    --asphalt:#12140E;
    --asphalt-2:#1B1E15;
    --red:#C4271D;
    --red-dark:#96190F;
    --cut:#5C8A2E;
    --shade:#2A4116;
    --bone:#F1EFE4;
    --dust:#9E9C8B;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#0A0B07;
    font-family:'Barlow',system-ui,sans-serif;
    color:var(--bone);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }

  .card{
    width:100%;
    max-width:400px;
    background:var(--asphalt);
    overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.6);
  }

  /* head */
  .head{
    position:relative;
    background:var(--asphalt-2);
    padding:34px 24px 26px;
    text-align:center;
    overflow:hidden;
  }
  .head::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(101deg,var(--shade) 0 26px,#34521C 26px 52px);
    opacity:.5;
  }
  .head > *{position:relative;z-index:2;}

  .biz{
    font-family:'Anton',sans-serif;
    text-transform:uppercase;
    line-height:.94;
    font-size:2.1rem;
    letter-spacing:.01em;
    text-shadow:0 2px 12px rgba(0,0,0,.5);
  }
  .biz .z{color:#FF6A5E;}
  .person{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.2em;
    font-size:.84rem;
    color:#E6E3D5;
    margin-top:12px;
  }

  .rule{height:6px;background:var(--red);}

  /* rows */
  .rows{padding:20px 20px 6px;}
  .row{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--bone);
    background:var(--asphalt-2);
    border:1.5px solid #2C3126;
    padding:13px 15px;
    margin-bottom:10px;
    transition:border-color .16s ease,transform .16s ease;
  }
  .row:hover,.row:focus-visible{border-color:var(--red);transform:translateY(-2px);}
  .ic{
    flex:0 0 38px;
    height:38px;
    background:var(--red);
    display:flex;align-items:center;justify-content:center;
    font-size:1.05rem;
  }
  .ic.green{background:var(--cut);}
  .lbl{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.17em;
    font-size:.68rem;
    color:var(--dust);
    display:block;
  }
  .val{font-size:1.03rem;font-weight:500;line-height:1.3;}

  /* qr */
  .qr-zone{
    text-align:center;
    padding:8px 20px 26px;
  }
  .qr-title{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.2em;
    font-size:.75rem;
    color:var(--dust);
    margin-bottom:14px;
  }
  .qr-box{
    display:inline-block;
    background:var(--bone);
    padding:12px;
  }
  .qr-box img{display:block;width:172px;height:172px;image-rendering:pixelated;}
  .qr-help{
    color:var(--dust);
    font-size:.84rem;
    margin-top:12px;
    line-height:1.45;
  }

  .save{
    display:block;
    text-align:center;
    background:var(--red);
    color:var(--bone);
    text-decoration:none;
    font-family:'Anton',sans-serif;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:1.02rem;
    padding:15px;
    transition:background .16s ease;
  }
  .save:hover,.save:focus-visible{background:var(--red-dark);}

  .foot{
    text-align:center;
    padding:16px;
    font-size:.8rem;
    color:var(--dust);
    background:var(--asphalt-2);
  }

  a:focus-visible{outline:3px solid var(--cut);outline-offset:3px;}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
